<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Tradegram Hero</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #050807;
    overflow: hidden;
    font-family: 'Tajawal', sans-serif;
  }

  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    min-height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #0a1410 0%, #050807 70%);
  }

  canvas#particles {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60vw;
    height: 60vw;
    max-width: 700px;
    max-height: 700px;
    background: radial-gradient(circle, rgba(0,255,136,0.12) 0%, rgba(0,255,136,0) 70%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 24px;
    max-width: 900px;
  }

  .brand {
    display: inline-block;
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 4px;
    color: #00ff88;
    border: 1px solid rgba(0,255,136,0.35);
    padding: 6px 18px;
    border-radius: 999px;
    margin-bottom: 28px;
    direction: ltr;
    text-transform: uppercase;
  }

  h1 {
    font-weight: 900;
    font-size: clamp(32px, 6vw, 68px);
    line-height: 1.25;
    color: #f2fff8;
    text-shadow: 0 0 40px rgba(0,255,136,0.25);
    margin-bottom: 22px;
  }

  h1 span {
    color: #00ff88;
    font-family: 'Tajawal', sans-serif;
    direction: ltr;
    display: inline-block;
  }

  p.subtitle {
    font-weight: 400;
    font-size: clamp(15px, 2.2vw, 20px);
    line-height: 1.9;
    color: rgba(230, 245, 238, 0.75);
    max-width: 640px;
    margin: 0 auto;
  }

  .cta {
    margin-top: 40px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #00ff88;
    color: #04140c;
    font-weight: 700;
    font-size: 16px;
    padding: 14px 34px;
    border-radius: 999px;
    box-shadow: 0 0 30px rgba(0,255,136,0.35);
    cursor: pointer;
    border: none;
    font-family: 'Tajawal', sans-serif;
  }
</style>
</head>
<body>

<div class="hero">
  <canvas id="particles"></canvas>
  <div class="glow"></div>

  <div class="content">
    <span class="brand">TRADEGRAM</span>
    <h1>اهلاً بكم في <span>Tradegram</span></h1>
    <p class="subtitle">اكبر منصة تواصل اجتماعي للمتداولين والمستثمرين في العالم</p>
    <button class="cta">انضم الآن</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let width, height, particles;

  function resize() {
    width = canvas.width = canvas.offsetWidth;
    height = canvas.height = canvas.offsetHeight;
  }

  function createParticles() {
    const count = Math.floor((width * height) / 9000);
    particles = Array.from({ length: count }, () => ({
      x: Math.random() * width,
      y: Math.random() * height,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      r: Math.random() * 1.8 + 0.6
    }));
  }

  const mouse = { x: null, y: null, active: false };
  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
    mouse.active = true;
  });
  canvas.addEventListener('mouseleave', () => { mouse.active = false; });

  function step() {
    ctx.clearRect(0, 0, width, height);

    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;

      if (mouse.active) {
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          const force = (120 - dist) / 120;
          p.x += (dx / dist) * force * 1.2;
          p.y += (dy / dist) * force * 1.2;
        }
      }

      if (p.x < 0) p.x = width;
      if (p.x > width) p.x = 0;
      if (p.y < 0) p.y = height;
      if (p.y > height) p.y = 0;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,255,136,0.85)';
      ctx.fill();
    }

    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const a = particles[i], b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 110) {
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = 'rgba(0,255,136,' + (0.16 * (1 - dist / 110)) + ')';
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(step);
  }

  window.addEventListener('resize', () => {
    resize();
    createParticles();
  });

  resize();
  createParticles();
  step();
</script>

</body>
</html>
